<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="GameVerse - Play. Compete. Conquer. A modern interactive gaming portal with mini-games, leaderboards, and achievements.">
  <title>GameVerse — Play. Compete. Conquer.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Particle Background -->
  <canvas id="particle-canvas"></canvas>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-logo">GAMEVERSE</div>
    <div class="loader-text">Loading Game Engine...</div>
    <div class="loader-bar-track">
      <div class="loader-bar" id="loader-bar"></div>
    </div>
    <div class="loader-percent" id="loader-percent">0%</div>
  </div>

  <!-- Navigation -->
  <nav id="navbar">
    <a href="#home" class="nav-logo">GAMEVERSE</a>
    <div class="nav-links" id="nav-links">
      <a href="#home" data-nav="home"><span class="nav-icon">🏠</span> Home</a>
      <a href="#games" data-nav="games"><span class="nav-icon">🎮</span> Games</a>
      <a href="#leaderboard" data-nav="leaderboard"><span class="nav-icon">🏆</span> Leaderboard</a>
      <a href="#profile" data-nav="profile"><span class="nav-icon">👤</span> Profile</a>
      <a href="#login" data-nav="login" id="nav-login-link"><span class="nav-icon">🔑</span> Login</a>
    </div>
    <div id="nav-user-display" class="nav-user" style="display:none;">
      <span id="nav-username"></span>
      <span class="level-badge" id="nav-level-badge">Lv 1</span>
    </div>
    <div class="nav-hamburger" id="nav-hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- Main Content -->
  <div id="main-content"></div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>© 2026 GameVerse. Play. Compete. Conquer.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/particles.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/dailyChallenge.js"></script>
  <script src="js/games/quiz.js"></script>
  <script src="js/games/memory.js"></script>
  <script src="js/games/snake.js"></script>
  <script src="js/games/tictactoe.js"></script>
  <script src="js/games/rps.js"></script>
  <script src="js/games/reaction.js"></script>
  <script src="js/games/colormatch.js"></script>
  <script src="js/games/mathsprint.js"></script>
  <script src="js/games/wordscramble.js"></script>
  <script src="js/games/whackamole.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
